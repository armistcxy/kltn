<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pgscale viz</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0f11;
    --surface: #161719;
    --surface2: #1e2024;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e9eb;
    --muted: #6b7280;
    --accent: #4f9eff;
    --green: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
    --coral: #fb7185;

    --c-static6: #34d399;
    --c-static5: #a78bfa;
    --c-reactive: #60a5fa;
    --c-predictive: #fbbf24;
    --c-hybrid: #fb7185;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(79,158,255,0.12);
    color: var(--accent);
    border: 1px solid rgba(79,158,255,0.2);
  }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 53px);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    max-height: calc(100vh - 53px);
  }

  .main {
    padding: 20px 24px;
    overflow-y: auto;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .run-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .run-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  .color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .run-name-input {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    flex: 1;
    outline: none;
    min-width: 0;
  }

  .run-name-input::placeholder { color: var(--muted); }

  .run-card textarea {
    width: 100%;
    min-height: 100px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    line-height: 1.5;
    padding: 10px 12px;
    resize: vertical;
    outline: none;
  }

  .run-card textarea::placeholder { color: var(--muted); }

  .run-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    font-size: 11px;
    color: var(--muted);
  }

  .run-stats { font-family: 'JetBrains Mono', monospace; font-size: 10px; }

  .btn-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 4px;
    transition: color 0.15s;
  }
  .btn-remove:hover { color: var(--red); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--surface2); border-color: rgba(255,255,255,0.2); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 500;
  }
  .btn-primary:hover { background: #6aadff; border-color: #6aadff; }

  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .scenario-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .scenario-area textarea {
    width: 100%;
    min-height: 80px;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    line-height: 1.5;
    padding: 10px 12px;
    resize: vertical;
    outline: none;
  }

  .chart-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab:hover { border-color: var(--border2); color: var(--text); }

  .tab.active {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  .chart-panel { display: none; }
  .chart-panel.active { display: block; }

  .chart-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .chart-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .chart-subtitle {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 16px;
    font-weight: 500;
  }

  .legend {
    display: flex;
    gap: 14px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .legend-line {
    width: 16px; height: 2px;
  }

  .legend-dash {
    width: 16px; height: 0;
    border-top: 2px dashed;
  }

  .chart-wrap { position: relative; width: 100%; }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .metric-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .metric-value {
    font-size: 20px;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
  }

  .metric-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    color: var(--muted);
    gap: 8px;
  }

  .empty-state .icon { font-size: 32px; opacity: 0.4; }
  .empty-state p { font-size: 13px; }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  select {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 8px;
    outline: none;
    cursor: pointer;
  }

  .export-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }

  .export-bar span { color: var(--muted); font-size: 12px; margin-left: auto; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>pgscale<span>viz</span></h1>
  <span class="badge">benchmark analyzer</span>
</header>

<div class="layout">
  <aside class="sidebar">

    <div>
      <div class="section-label">scenario (expected TPS)</div>
      <div class="scenario-area">
        <textarea id="scenarioInput" placeholder="# gradual-ramp (18 min) — paste your YAML steps:
- duration: 180s
  rps: 50
- duration: 600s
  rps: 50
  end_rps: 1500
- duration: 120s
  rps: 1500
- duration: 180s
  rps: 1500
  end_rps: 50

# or compact comma format (flat steps only):
# 180s@50, 600s@50, 120s@1500, 180s@1500"></textarea>
      </div>
    </div>

    <div>
      <div class="section-label">runs</div>
      <div id="runList" style="display:flex;flex-direction:column;gap:10px;"></div>
      <button class="btn btn-sm" style="margin-top:10px;width:100%" onclick="addRun()">+ add run</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-primary" onclick="renderAll()">render charts</button>
      <button class="btn btn-sm" onclick="loadSample()">load sample data</button>
    </div>

  </aside>

  <main class="main">
    <div class="chart-tabs">
      <button class="tab active" onclick="switchTab('tps')">TPS timeline</button>
      <button class="tab" onclick="switchTab('latency')">latency timeline</button>
      <button class="tab" onclick="switchTab('overlay')">overlay compare</button>
      <button class="tab" onclick="switchTab('percentiles')">percentiles</button>
      <button class="tab" onclick="switchTab('saturation')">saturation</button>
      <button class="tab" onclick="switchTab('summary')">summary table</button>
      <button class="tab" onclick="switchTab('controller')">controller</button>
    </div>

    <div id="panel-tps" class="chart-panel active"></div>
    <div id="panel-latency" class="chart-panel"></div>
    <div id="panel-overlay" class="chart-panel"></div>
    <div id="panel-percentiles" class="chart-panel"></div>
    <div id="panel-saturation" class="chart-panel"></div>
    <div id="panel-summary" class="chart-panel"></div>
    <div id="panel-controller" class="chart-panel"></div>
  </main>
</div>

<script>
const COLORS = ['#34d399','#fb7185','#60a5fa','#fbbf24','#a78bfa','#f97316','#22d3ee','#e879f9'];
const CHART_INSTANCES = {};

let runs = [];
let runIdCounter = 0;

function addRun(name='', log='', color=null, controllerLog='') {
  const id = ++runIdCounter;
  const c = color || COLORS[(runs.length) % COLORS.length];
  runs.push({ id, name, log, color: c, controllerLog });
  renderRunList();
  return id;
}

function removeRun(id) {
  runs = runs.filter(r => r.id !== id);
  renderRunList();
}

function renderRunList() {
  const el = document.getElementById('runList');
  el.innerHTML = '';
  runs.forEach(run => {
    const card = document.createElement('div');
    card.className = 'run-card';
    card.innerHTML = `
      <div class="run-card-header">
        <div class="color-dot" style="background:${run.color}"></div>
        <input class="run-name-input" value="${run.name}" placeholder="run name (e.g. hybrid)"
          onchange="updateRun(${run.id},'name',this.value)">
        <button class="btn-remove" onclick="removeRun(${run.id})">×</button>
      </div>
      <textarea placeholder="paste loadgen output here..."
        onchange="updateRun(${run.id},'log',this.value)"
        oninput="updateRun(${run.id},'log',this.value)">${run.log}</textarea>
      <div style="border-top:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:5px;padding:5px 12px;cursor:pointer;color:var(--muted);font-size:10px;font-family:'JetBrains Mono',monospace;user-select:none"
          onclick="const ta=this.nextElementSibling;ta.style.display=ta.style.display==='none'?'block':'none'">
          ▸ controller log (optional — shows target replicas)
        </div>
        <textarea style="display:none;width:100%;min-height:72px;background:transparent;border:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.5;padding:6px 12px;resize:vertical;outline:none"
          placeholder="paste scale-controller stdout here...&#10;time=... msg=decision action=scale-up target=3 ..."
          oninput="updateRun(${run.id},'controllerLog',this.value)">${run.controllerLog || ''}</textarea>
      </div>
      <div class="run-card-footer">
        <span class="run-stats" id="stats-${run.id}">${getRunStats(run)}</span>
      </div>
    `;
    el.appendChild(card);
  });
}

function updateRun(id, field, value) {
  const run = runs.find(r => r.id === id);
  if (run) {
    run[field] = value;
    if (field === 'log') {
      const statsEl = document.getElementById(`stats-${id}`);
      if (statsEl) statsEl.textContent = getRunStats(run);
    }
  }
}

function getRunStats(run) {
  const data = parseLog(run.log);
  if (!data.length) return 'no data';
  const dur = Math.round(data[data.length-1].t / 60);
  const avgTPS = Math.round(data.reduce((s,d)=>s+d.tps,0)/data.length);
  return `${data.length} pts · ${dur}m · avg ${avgTPS} TPS`;
}

// ── Parser ──────────────────────────────────────────────────────────────────

function toMs(val, unit) {
  return unit === 's' ? parseFloat(val) * 1000 : parseFloat(val);
}

function parseLog(text) {
  if (!text) return [];
  const re = /\[\s*([\d]+m[\d]+s|[\d]+s)\]\s+TPS:\s+([\d.]+)\s*\|\s*P50:\s*([\d.]+)(ms|s)\s*\|\s*P95:\s*([\d.]+)(ms|s)\s*\|\s*P99:\s*([\d.]+)(ms|s)/g;
  const rows = [];
  let m;
  while ((m = re.exec(text)) !== null) {
    const t = parseTime(m[1]);
    rows.push({
      t,
      tps: parseFloat(m[2]),
      p50: toMs(m[3], m[4]),
      p95: toMs(m[5], m[6]),
      p99: toMs(m[7], m[8]),
    });
  }

  // Also try to get summary
  const sumTPS = text.match(/TPS:\s+([\d.]+)\s*\n.*\n.*P50.*?:\s*([\d.]+)ms.*\n.*P95.*?:\s*([\d.]+)ms.*\n.*P99.*?:\s*([\d.]+)ms/);
  return rows;
}

function parseSummary(text) {
  if (!text) return null;
  const tps = text.match(/║\s+TPS:\s+([\d.]+)/)?.[1];
  const p50 = text.match(/P50 Latency:\s+([\d.]+)ms/)?.[1];
  const p95 = text.match(/P95 Latency:\s+([\d.]+)ms/)?.[1];
  const p99 = text.match(/P99 Latency:\s+([\d.]+)ms/)?.[1];
  const p999 = text.match(/P99\.9 Latency:\s+([\d.]+)ms/)?.[1];
  const ops = text.match(/Total Ops:\s+([\d,]+)/)?.[1];
  const errors = text.match(/Errors:\s+(\d+)/)?.[1];
  const dur = text.match(/Duration:\s+([\d.]+s)/)?.[1];
  if (!tps) return null;
  return {
    tps: parseFloat(tps),
    p50: parseFloat(p50),
    p95: parseFloat(p95),
    p99: parseFloat(p99),
    p999: parseFloat(p999),
    ops: parseInt((ops||'0').replace(',','')),
    errors: parseInt(errors||0),
    dur
  };
}

function parseTime(s) {
  const mMatch = s.match(/(\d+)m(\d+)s/);
  if (mMatch) return parseInt(mMatch[1])*60 + parseInt(mMatch[2]);
  const sMatch = s.match(/(\d+)s/);
  if (sMatch) return parseInt(sMatch[1]);
  return 0;
}

function parseScenario(text) {
  text = text.trim();
  if (!text) return [];

  // compact format: 120s@50, 60s@150 ...
  if (text.includes('@')) {
    const steps = [];
    const parts = text.split(',');
    for (const p of parts) {
      const m = p.trim().match(/(\d+)s@(\d+)/);
      if (m) steps.push({ dur: parseInt(m[1]), rps: parseInt(m[2]) });
    }
    return buildExpected(steps);
  }

  // YAML-ish format — parse block-by-block so optional end_rps aligns correctly.
  // Strip comments first to avoid matching values inside `# ... | rps: N` annotations.
  const stripped = text.split('\n').map(line => line.replace(/#.*$/, '')).join('\n');
  const steps = [];
  const blocks = stripped.split(/(?=^\s*-\s)/m).filter(b => /duration:/.test(b));
  for (const block of blocks) {
    const durM = block.match(/duration:\s*(\d+)s/);
    const rpsM = block.match(/\brps:\s*([\d.]+)/);
    const endM = block.match(/end_rps:\s*([\d.]+)/);
    if (durM && rpsM) {
      steps.push({
        dur:    parseInt(durM[1]),
        rps:    parseFloat(rpsM[1]),
        endRps: endM ? parseFloat(endM[1]) : 0,
      });
    }
  }
  return buildExpected(steps);
}

function buildExpected(steps) {
  const pts = [];
  for (const s of steps) {
    const n = Math.ceil(s.dur / 5);
    for (let i = 0; i < n; i++) {
      if (s.endRps > 0) {
        const progress = i / n;
        pts.push(s.rps + (s.endRps - s.rps) * progress);
      } else {
        pts.push(s.rps);
      }
    }
  }
  return pts;
}

// ── Replica log parser ───────────────────────────────────────────────────────

function parseReplicaLog(text) {
  if (!text) return [];
  const rows = [];
  // Supports: [2m30s] → 3 | [2m30s] instances: 3 | [2m30s] target: 3 | [2m30s] 3
  const re = /\[\s*([\d]+m[\d]+s|[\d]+s)\]\s*(?:→|instances:|replicas:|target:)?\s*(\d+)/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    rows.push({ t: parseTime(m[1]), instances: parseInt(m[2]) });
  }
  return rows.sort((a, b) => a.t - b.t);
}

function replicaToSeries(replicaData, logData) {
  if (!replicaData.length || !logData.length) return [];
  const result = [];
  let current = null;
  let rIdx = 0;
  for (const point of logData) {
    while (rIdx < replicaData.length && replicaData[rIdx].t <= point.t) {
      current = replicaData[rIdx].instances;
      rIdx++;
    }
    result.push(current);
  }
  return result;
}

// ── Charting helpers ─────────────────────────────────────────────────────────

function destroyChart(id) {
  if (CHART_INSTANCES[id]) {
    CHART_INSTANCES[id].destroy();
    delete CHART_INSTANCES[id];
  }
}

function makeCanvas(id, height=320) {
  const wrap = document.createElement('div');
  wrap.className = 'chart-wrap';
  wrap.style.height = height + 'px';
  const c = document.createElement('canvas');
  c.id = id;
  wrap.appendChild(c);
  return { wrap, canvas: c };
}

function makeTimeLabels(nOrTimestamps) {
  const timestamps = Array.isArray(nOrTimestamps)
    ? nOrTimestamps
    : Array.from({length: nOrTimestamps}, (_, i) => (i + 1) * 5);
  return timestamps.map(t => {
    if (t % 60 === 0) return `${t/60}m`;
    if (t % 30 === 0) return `${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}`;
    return '';
  });
}

function tooltipTime(sec) {
  return `${Math.floor(sec/60)}m${String(sec%60).padStart(2,'0')}s`;
}

// ── Controller log parser ────────────────────────────────────────────────────

function parseControllerLog(text) {
  if (!text.trim()) return { metrics: [], decisions: [] };

  const lines = text.split('\n');
  let startTime = null;
  const metrics = [];
  const decisions = [];

  function getRelSec(isoStr) {
    const ms = new Date(isoStr).getTime();
    if (!startTime) startTime = ms;
    return (ms - startTime) / 1000;
  }

  function parseKV(line) {
    const kv = {};
    // match key=value or key="quoted value"
    const re = /(\w+)=("(?:[^"\\]|\\.)*"|[^\s]+)/g;
    let m;
    while ((m = re.exec(line)) !== null) {
      kv[m[1]] = m[2].replace(/^"|"$/g, '');
    }
    return kv;
  }

  for (const line of lines) {
    if (!line.trim()) continue;
    const kv = parseKV(line);
    if (!kv.time) continue;

    const t = getRelSec(kv.time);
    const msg = kv.msg;

    if (msg === 'metrics observed') {
      // at= gives the actual observation timestamp
      const atT = kv.at ? getRelSec(kv.at) : t;
      // values="map[key:num key:num]"
      const valStr = kv.values || '';
      const valMap = {};
      const kvRe = /([\w_]+):([\d.eE+\-]+)/g;
      let vm;
      while ((vm = kvRe.exec(valStr)) !== null) {
        valMap[vm[1]] = parseFloat(vm[2]);
      }
      if (Object.keys(valMap).length) {
        metrics.push({ t: atT, values: valMap });
      }
    } else if (msg === 'decision') {
      decisions.push({
        t,
        action:     kv.action || 'none',
        target:     parseInt(kv.target     ?? '0'),
        reactive:   parseInt(kv.reactive   ?? '0'),
        predictive: parseInt(kv.predictive ?? '0'),
        mode:       kv.mode || '',
        reason:     kv.reason || '',
      });
    }
  }

  return { metrics, decisions };
}

// ── Derive target series from controller log ─────────────────────────────────

function deriveReplicaSeries(controllerLogText, logData) {
  if (!controllerLogText || !logData.length) return null;
  const { decisions } = parseControllerLog(controllerLogText);
  if (!decisions.length) return null;

  const targetData = decisions.map(d => ({ t: d.t, instances: d.target }));

  return {
    targetSeries: replicaToSeries(targetData, logData),
    decisions,
  };
}

// ── Controller charts ─────────────────────────────────────────────────────────

function renderController() {
  const panel = document.getElementById('panel-controller');
  panel.innerHTML = '';

  // Use controller logs from all runs; show each run separately
  const runsWithCtrl = runs.filter(r => r.controllerLog && r.controllerLog.trim());
  if (!runsWithCtrl.length) {
    showEmpty(panel, 'Add a controller log to any run and click render');
    return;
  }

  for (const run of runsWithCtrl) {
    renderControllerRun(panel, run);
  }
}

function renderControllerRun(panel, run) {
  const raw = run.controllerLog;
  const { metrics, decisions } = parseControllerLog(raw);

  if (!metrics.length && !decisions.length) {
    showEmpty(panel, 'Paste scale-controller log and click render');
    return;
  }

  // Collect all metric keys
  const metricKeys = [...new Set(metrics.flatMap(m => Object.keys(m.values)))];

  // ── Chart 1: metric values over time ──
  if (metrics.length) {
    const box = document.createElement('div');
    box.className = 'chart-box';
    const legendHTML = metricKeys.map((k, i) =>
      `<span class="legend-item"><span class="legend-line" style="background:${COLORS[i % COLORS.length]}"></span>${k}</span>`
    ).join('');
    box.innerHTML = `
      <div class="chart-title" style="color:${run.color}">${run.name || 'run '+run.id}</div>
      <div class="chart-subtitle">observed metric values</div>
      <div class="legend">${legendHTML}</div>
    `;
    const cid = `ctrl-metrics-${run.id}`;
    const { wrap } = makeCanvas(cid, 280);
    box.appendChild(wrap);
    panel.appendChild(box);
    destroyChart(cid);

    const labels = metrics.map(m => {
      const t = m.t;
      if (t % 60 === 0) return `${t/60}m`;
      if (t < 60) return `${Math.round(t)}s`;
      return `${Math.floor(t/60)}m${String(Math.round(t%60)).padStart(2,'0')}s`;
    });

    const datasets = metricKeys.map((k, i) => ({
      label: k,
      data: metrics.map(m => m.values[k] ?? null),
      borderColor: COLORS[i % COLORS.length],
      borderWidth: 2,
      pointRadius: 3,
      tension: 0.2,
      backgroundColor: 'transparent',
      spanGaps: true,
    }));

    const tsArr = metrics.map(m => m.t);
    CHART_INSTANCES[cid] = new Chart(document.getElementById(cid), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: ctx => {
                const t = tsArr[ctx[0].dataIndex] ?? 0;
                return `${Math.floor(t/60)}m${String(Math.round(t%60)).padStart(2,'0')}s`;
              },
              label: ctx => ` ${ctx.dataset.label}: ${ctx.raw?.toFixed(4)}`
            }
          }
        },
        scales: {
          x: { ticks: { color: '#6b7280', font: { size: 11 }, maxRotation: 0 }, grid: { color: 'rgba(255,255,255,0.05)' } },
          y: { min: 0, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b7280', font: { size: 11 } } }
        }
      }
    });
  }

  // ── Chart 2: scaling decisions ──
  if (decisions.length) {
    const box2 = document.createElement('div');
    box2.className = 'chart-box';
    box2.innerHTML = `
      <div class="chart-title" style="color:${run.color}">${run.name || 'run '+run.id}</div>
      <div class="chart-subtitle">scaling decisions — target / reactive / predictive</div>
      <div class="legend">
        <span class="legend-item"><span class="legend-line" style="background:#a78bfa"></span>target</span>
        <span class="legend-item"><span class="legend-line" style="background:#60a5fa"></span>reactive</span>
        <span class="legend-item"><span class="legend-line" style="background:#fbbf24"></span>predictive</span>
      </div>
    `;
    const cid2 = `ctrl-decisions-${run.id}`;
    const { wrap: wrap2 } = makeCanvas(cid2, 240);
    box2.appendChild(wrap2);
    panel.appendChild(box2);
    destroyChart(cid2);

    const labels2 = decisions.map(d => {
      const t = d.t;
      if (t < 60) return `${Math.round(t)}s`;
      return `${Math.floor(t/60)}m${String(Math.round(t%60)).padStart(2,'0')}s`;
    });

    const actionColors = decisions.map(d =>
      d.action === 'scale-up'   ? 'rgba(52,211,153,0.18)' :
      d.action === 'scale-down' ? 'rgba(248,113,113,0.18)' :
      'transparent'
    );

    const tsArr2 = decisions.map(d => d.t);
    CHART_INSTANCES[cid2] = new Chart(document.getElementById(cid2), {
      type: 'line',
      data: {
        labels: labels2,
        datasets: [
            { label:'target',     data: decisions.map(d=>d.target),        borderColor:'#a78bfa', borderWidth:2.5, stepped:'before', pointRadius:4, pointBackgroundColor: decisions.map(d => d.action==='scale-up'?'#34d399':d.action==='scale-down'?'#f87171':'#a78bfa'), tension:0, backgroundColor:'transparent' },
            { label:'reactive',   data: decisions.map(d=>d.reactive),      borderColor:'#60a5fa', borderWidth:1.5, stepped:'before', pointRadius:2, tension:0, backgroundColor:'transparent' },
            { label:'predictive', data: decisions.map(d=>d.predictive),    borderColor:'#fbbf24', borderWidth:1.5, stepped:'before', pointRadius:2, tension:0, borderDash:[4,3], backgroundColor:'transparent' },
          ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: ctx => {
                const i = ctx[0].dataIndex;
                const t = tsArr2[i] ?? 0;
                const d = decisions[i];
                return `${Math.floor(t/60)}m${String(Math.round(t%60)).padStart(2,'0')}s  [${d.action}]`;
              },
              label: ctx => ` ${ctx.dataset.label}: ${ctx.raw}`,
              afterBody: ctx => {

              }

          y: { min: 0, ticks: { color: '#6b7280', font: { size: 11 }, stepSize: 1, precision: 0 }, grid: { color: 'rgba(255,255,255,0.05)' }, title: { display: true, text: 'instances', color: '#6b7280', font: { size: 11 } } }

    `;

  }
}

// ── Render all ───────────────────────────────────────────────────────────────

function renderAll() {
  const scenarioText = document.getElementById('scenarioInput').value;
  const expected = parseScenario(scenarioText);
  const parsed = runs.map(r => ({ ...r, data: parseLog(r.log), summary: parseSummary(r.log) }));

  renderTPS(parsed, expected);
  renderLatency(parsed, expected);
  renderOverlay(parsed, expected);
  renderPercentiles(parsed);
  renderSaturation(parsed);
  renderSummary(parsed);
  renderController();
}

// ── TPS Timeline (one chart per run) ────────────────────────────────────────

function renderTPS(parsed, expected) {
  const panel = document.getElementById('panel-tps');
  panel.innerHTML = '';

  if (!parsed.length) { showEmpty(panel, 'Add a run and click render'); return; }

  // metrics row
  const grid = document.createElement('div');
  grid.className = 'metrics-grid';
  parsed.forEach(r => {
    if (!r.summary) return;
    const card = document.createElement('div');
    card.className = 'metric-card';
    card.innerHTML = `
      <div class="metric-label" style="color:${r.color}">${r.name || 'run '+r.id}</div>
      <div class="metric-value">${Math.round(r.summary.tps)}</div>
      <div class="metric-sub">avg TPS · P95 ${r.summary.p95}ms</div>
    `;
    grid.appendChild(card);
  });
  panel.appendChild(grid);

  parsed.forEach(run => {
    if (!run.data.length) return;

    const box = document.createElement('div');
    box.className = 'chart-box';

    const n = run.data.length;
    const timestamps = run.data.map(d => d.t);
    const labels = makeTimeLabels(timestamps);

    const ctrlDerived = deriveReplicaSeries(run.controllerLog || '', run.data);
    const hasCtrl = !!ctrlDerived;
    const maxInst = hasCtrl
      ? Math.max(...ctrlDerived.targetSeries.filter(v => v !== null))
      : 0;

    box.innerHTML = `
      <div class="chart-title">TPS timeline</div>
      <div class="chart-subtitle">${run.name || 'run '+run.id}</div>
      <div class="legend">
        ${expected.length ? `<span class="legend-item"><span class="legend-dash" style="border-color:${run.color};opacity:.4"></span>expected</span>` : ''}
        <span class="legend-item"><span class="legend-line" style="background:${run.color}"></span>actual TPS</span>
        <span class="legend-item"><span class="legend-line" style="background:#f87171"></span>P95 latency (right)</span>
        ${hasCtrl ? `<span class="legend-item"><span class="legend-line" style="background:#a78bfa"></span>target replicas</span>` : ''}
      </div>
    `;

    const cid = `tps-${run.id}`;
    const { wrap } = makeCanvas(cid, 280);
    box.appendChild(wrap);
    panel.appendChild(box);

    destroyChart(cid);

    const expSlice = expected.slice(0, n);
    const datasets = [];

    if (expSlice.length) {
      datasets.push({
        type: 'line', label: 'expected',
        data: expSlice, yAxisID: 'y',
        borderColor: run.color, borderWidth: 1.5, borderDash: [5,3],
        pointRadius: 0, tension: 0,
        backgroundColor: 'transparent', order: 3
      });
    }

    datasets.push({
      type: 'line', label: 'actual TPS',
      data: run.data.map(d=>d.tps), yAxisID: 'y',
      borderColor: run.color, borderWidth: 2,
      pointRadius: 0, tension: 0.2,
      backgroundColor: run.color.replace(')',',0.07)').replace('rgb','rgba'),
      fill: true, order: 2
    });

    datasets.push({
      type: 'line', label: 'P95 ms',
      data: run.data.map(d=>d.p95), yAxisID: 'y2',
      borderColor: '#f87171', borderWidth: 1.5,
      pointRadius: 0, tension: 0.2,
      backgroundColor: 'rgba(248,113,113,0.06)',
      fill: true, order: 1
    });

    if (hasCtrl) {
      datasets.push({
        type: 'line', label: 'target replicas',
        data: ctrlDerived.targetSeries, yAxisID: 'y3',
        borderColor: '#a78bfa', borderWidth: 2.5,
        pointRadius: 3, pointBackgroundColor: ctrlDerived.decisions.map(d =>
          d.action === 'scale-up' ? '#34d399' : d.action === 'scale-down' ? '#f87171' : '#a78bfa'
        ),
        stepped: 'before', tension: 0,
        backgroundColor: 'transparent', order: 0
      });
    }

    const maxTPS = Math.max(...run.data.map(d=>d.tps), ...(expSlice.length ? expSlice : [0]));
    const maxLat = Math.max(...run.data.map(d=>d.p95));
    CHART_INSTANCES[cid] = new Chart(document.getElementById(cid), {
      data: { labels, datasets },
      options: chartOptions(labels, Math.ceil(maxTPS * 1.15), Math.ceil(maxLat * 1.15), true, hasCtrl ? maxInst + 1 : 0, timestamps)
    });
  });
}

function renderSummary(parsed) {
  const panel = document.getElementById('panel-summary');
  panel.innerHTML = '';

  const hasData = parsed.some(r=>r.summary||r.data.length);
  if (!hasData) { showEmpty(panel); return; }

  const box = document.createElement('div');
  box.className = 'chart-box';
  box.innerHTML = `<div class="chart-title">summary table</div><div class="chart-subtitle" style="margin-bottom:16px">all runs compared</div>`;

  const table = document.createElement('table');
  table.style.cssText = 'width:100%;border-collapse:collapse;font-size:12px;font-family:JetBrains Mono,monospace';

  const headers = ['run','avg TPS','P50','P95','P99','P99.9','errors','sat >200ms'];
  const thead = document.createElement('thead');
  thead.innerHTML = `<tr>${headers.map(h=>`<th style="text-align:left;padding:8px 10px;color:#6b7280;font-weight:500;border-bottom:1px solid rgba(255,255,255,0.07)">${h}</th>`).join('')}</tr>`;
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  parsed.forEach(run => {
    const s = run.summary;
    const sat = run.data.filter(d=>d.p95>200).length * 5;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04)">
        <span style="display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:50%;background:${run.color};flex-shrink:0"></span>
          ${run.name||'run '+run.id}
        </span>
      </td>
      <td style="padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04)">${s?Math.round(s.tps):'—'}</td>
      <td style="padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04)">${s?s.p50+'ms':'—'}</td>
      <td style="padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);color:${s&&s.p95>100?'#f87171':s&&s.p95>50?'#fbbf24':'#34d399'}">${s?s.p95+'ms':'—'}</td>
      <td style="padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04)">${s?s.p99+'ms':'—'}</td>
      <td style="padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04)">${s?s.p999+'ms':'—'}</td>
      <td style="padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);color:${s&&s.errors>0?'#f87171':'#34d399'}">${s?s.errors:'—'}</td>
      <td style="padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);color:${sat>60?'#f87171':sat>0?'#fbbf24':'#34d399'}">${sat}s</td>
    `;
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  box.appendChild(table);
  panel.appendChild(box);
}

// ── Chart option helpers ──────────────────────────────────────────────────────

function xScale(labels) {
  return {
    grid: {
      color: (ctx) => {
        const i = ctx.index;
        const sec = (i + 1) * 5;
        if (sec % 60 === 0) return 'rgba(255,255,255,0.1)';
        return 'rgba(255,255,255,0.03)';
      }
    },
    ticks: {
      color: (ctx) => {
        const i = ctx.index;
        const sec = (i + 1) * 5;
        if (sec % 60 === 0) return '#9ca3af';
        return '#4b5563';
      },
      font: (ctx) => {
        const i = ctx.index;
        const sec = (i + 1) * 5;
        return { size: sec % 60 === 0 ? 11 : 10 };
      },
      maxRotation: 0,
      autoSkip: false,
      callback: (v, i) => labels[i]
    }
  };
}

function chartOptions(labels, maxY=1700, maxY2=500, dualAxis=true, maxInstances=0, timestamps=null) {
  const scales = {
    x: xScale(labels),
    y: {
      position:'left', min:0, max:maxY,
      grid:{color:'rgba(255,255,255,0.05)'},
      ticks:{color:'#60a5fa',font:{size:11}},
      title:{display:true,text:'TPS',color:'#60a5fa',font:{size:11}}
    }
  };
  if (dualAxis && maxY2) {
    scales.y2 = {
      position:'right', min:0, max:maxY2,
      grid:{drawOnChartArea:false},
      ticks:{color:'#f87171',font:{size:11}},
      title:{display:true,text:'P95 (ms)',color:'#f87171',font:{size:11}}
    };
  }
  if (maxInstances > 0) {
    scales.y3 = {
      position:'right', offset:true, min:0, max:maxInstances,
      grid:{drawOnChartArea:false},
      ticks:{color:'#a78bfa',font:{size:11},stepSize:1,precision:0},
      title:{display:true,text:'replicas',color:'#a78bfa',font:{size:11}}
    };
  }
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{callbacks:{
        title: ctx => tooltipTime(timestamps ? (timestamps[ctx[0].dataIndex] ?? (ctx[0].dataIndex + 1) * 5) : (ctx[0].dataIndex + 1) * 5),
        label: ctx => {
          if (ctx.dataset.yAxisID==='y2') return ` ${ctx.dataset.label}: ${ctx.raw?.toFixed(1)}ms`;
          if (ctx.dataset.yAxisID==='y3') return ` replicas: ${ctx.raw}`;
          return ` ${ctx.dataset.label}: ${Math.round(ctx.raw)} TPS`;
        }
      }}
    },
    scales
  };
}

function showEmpty(panel, msg='No data — add a run and click render') {
  panel.innerHTML = `
    <div class="empty-state">
      <div class="icon">◈</div>
      <p>${msg}</p>
    </div>
  `;
}

// ── Tab switching ─────────────────────────────────────────────────────────────

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.chart-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}
