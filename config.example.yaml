minInstances: 1
maxInstances: 4

pollInterval: 30s
cooldown: 60s

# "max" (default) or "weighted_average"
aggregation: max

metrics:
  - name: backends
    # Total active connections across all pods
    query: 'sum(cnpg_backends_total{namespace="default", pod=~"pg-cluster-.*"})'
    scaleUpThreshold: 15
    scaleDownThreshold: 5
    targetValuePerReplica: 10  # ~10 concurrent connections per replica = healthy zone
    weight: 1.0

  - name: tps
    # Transactions per second (commits + rollbacks)
    query: |
      sum(rate(cnpg_pg_stat_database_xact_commit{namespace="default", pod=~"pg-cluster-.*"}[1m]))
      + sum(rate(cnpg_pg_stat_database_xact_rollback{namespace="default", pod=~"pg-cluster-.*"}[1m]))
    scaleUpThreshold: 300 # 80 of 370 (1 replica saturation point)
    scaleDownThreshold: 100 # ~27% capacity, safe to remove
    targetValuePerReplica: 330 # each replica handle around 330 TPS  
    weight: 0.8

  - name: cpu_cores
    # CPU usage in cores across all pods
    query: 'sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace="default", pod=~"pg-cluster-.*"})'
    scaleUpThreshold: 2.0
    scaleDownThreshold: 0.4
    targetValuePerReplica: 0.8
    weight: 0.5

# Optional: enable predictive scaling once a Predictor is attached via WithPredictor().
prediction:
  enabled: false
  type: sma
  metricName: tps
  horizon: 5m  # how far ahead to forecast
  minHistoryDuration: 3m  # wait for 2m of data before activating
  sma:
    window: 10 # average the last 10 polls (= last 5 minutes at 30s interval)
