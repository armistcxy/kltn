# CPU-only reactive scaling — baseline "traditional HPA" scenario.
# Mirrors what a standard Kubernetes HPA would do: scale on CPU utilisation only,
# with no database-aware metrics and no prediction.
# Used as the control group to compare against hybrid/reactive/predictive configs.

minInstances: 1
maxInstances: 5

pollInterval: 30s
cooldown: 30s
scaleDownStabilizationWindow: 75s

scalingMode: reactive
aggregation: max

metrics:
  - name: cpu_usage
    query: |
      sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{
        namespace="default",
        pod=~"pg-cluster-.*"
      })
    scaleUpThreshold: 1.0
    scaleDownThreshold: 0.4
    targetValuePerReplica: 1.0
    weight: 1.0

prediction:
  enabled: false
