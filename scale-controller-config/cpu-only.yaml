minInstances: 1
maxInstances: 5
pollInterval: 30s
cooldown: 30s
scaleDownStabilizationWindow: 75s
scalingMode: reactive
aggregation: max

metrics:
  - name: cpu_usage
    query: |
      sum(rate(container_cpu_usage_seconds_total{
        namespace="default",
        pod=~"pg-cluster-.*",
        container="postgres"
      }[3m]))
    targetValuePerReplica: 1.75