minInstances: 1
maxInstances: 5
pollInterval: 15s
cooldown: 30s
scaleDownStabilizationWindow: 75s
aggregation: max
scalingMode: predictive

metrics:
  - name: backends
    query: 'avg_over_time(sum(cnpg_backends_total{namespace="default", pod=~"pg-cluster-.*", state="active", usename="app"})[2m:15s]) OR vector(0)'
    targetValuePerReplica: 15
    scaleDownThreshold: 8
    scaleDownGuard: true

  - name: avg_latency
    query: |
      sum(rate(cnpg_pg_stat_statements_total_exec_time_seconds{namespace="default", pod=~"pg-cluster-.*"}[3m]))
      /
      sum(rate(cnpg_pg_stat_statements_calls{namespace="default", pod=~"pg-cluster-.*"}[3m]))
    scaleUpThreshold: 0.15
    scaleDownThreshold: 0.02
    scaleUpOnly: true
    scaleDownGuard: true
  
  - name: tps
    query: |
      sum(rate(cnpg_pg_stat_database_xact_commit{namespace="default", pod=~"pg-cluster-.*"}[2m]))
      + sum(rate(cnpg_pg_stat_database_xact_rollback{namespace="default", pod=~"pg-cluster-.*"}[2m]))
    targetValuePerReplica: 400
    scaleDownGuard: false

prediction:
  enabled: true
  type: holtwinters
  metricName: tps
  horizon: 2m
  minHistoryDuration: 5m
  holtwinters:
    alpha: 0.4
    beta: 0.3