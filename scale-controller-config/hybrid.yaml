minInstances: 1
maxInstances: 5
pollInterval: 15s
cooldown: 30s
aggregation: max
scaleDownStabilizationWindow: 50s
scalingMode: hybrid

metrics:
  - name: avg_latency
    query: |
      sum(rate(cnpg_pg_statements_aggregate_total_exec_time_seconds[3m])) / sum(rate(cnpg_pg_statements_aggregate_calls[3m]))
    scaleUpThreshold: 0.15
    scaleDownThreshold: 0.02
    scaleUpOnly: true
    scaleDownGuard: true

  - name: tps
    query: |
      sum(rate(cnpg_pg_tps_xact_commit[90s])) + sum(rate(cnpg_pg_tps_xact_rollback[90s]))
    targetValuePerReplica: 390
    scaleDownGuard: false

prediction:
  enabled: true
  type: holtwinters
  metricName: tps
  horizon: 2m
  minHistoryDuration: 20m
  holtwinters:
    alpha: 0.4
    beta: 0.25
    gamma: 0.2
    seasonLength: 40   # 600s cycle / 15s pollInterval
