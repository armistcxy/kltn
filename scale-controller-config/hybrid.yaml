minInstances: 1
maxInstances: 5
pollInterval: 15s
cooldown: 30s
aggregation: max
scaleDownStabilizationWindow: 75s
scalingMode: hybrid

metrics:
  - name: backends
    query: 'avg_over_time(sum(cnpg_backends_total{namespace="default", pod=~"pg-cluster-.*", state="active", usename="app"})[2m:15s])'
    scaleDownThreshold: 8
    targetValuePerReplica: 15  
    scaleDownGuard: true    

  - name: tps
    query: |
      sum(rate(cnpg_pg_stat_database_xact_commit{namespace="default", pod=~"pg-cluster-.*"}[2m]))
      + sum(rate(cnpg_pg_stat_database_xact_rollback{namespace="default", pod=~"pg-cluster-.*"}[2m]))
    targetValuePerReplica: 400
    scaleDownGuard: false
  
prediction:
  enabled: true
  type: ewma
  metricName: tps
  horizon: 2m
  minHistoryDuration: 5m
  ewma:
    alpha: 0.5
    trendWindow: 3