apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-custom-metrics
  labels:
    cnpg.io/reload: ""
data:
  queries: |
    avg_query_duration:
      query: "SELECT COALESCE(sum(total_exec_time) / NULLIF(sum(calls), 0), 0) as avg_ms FROM pg_stat_statements"
      metrics:
        - avg_ms:
            usage: "GAUGE"
            description: "Average query execution time in milliseconds"

    slow_queries_count:
      query: "SELECT count(*) as count FROM pg_stat_statements WHERE mean_exec_time > 500"
      metrics:
        - count:
            usage: "GAUGE"
            description: "Number of queries with mean execution time > 500ms"
    
    tps_metrics:
      query: "SELECT sum(xact_commit + xact_rollback) as total FROM pg_stat_database WHERE datname = 'app'"
      metrics:
        - total:
            usage: "COUNTER"
            description: "Total number of transactions (commits + rollbacks)"
    
    cache_hit_ratio:
      query: |
        SELECT 
          datname,
          (blks_hit::float / NULLIF(blks_hit + blks_read, 0)) * 100 as ratio
        FROM pg_stat_database 
        WHERE datname = 'app'
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - ratio:
            usage: "GAUGE"
            description: "Cache hit ratio percentage"
    
    active_connections:
      query: "SELECT count(*) as count FROM pg_stat_activity WHERE state = 'active' AND backend_type = 'client backend'"
      metrics:
        - count:
            usage: "GAUGE"
            description: "Number of currently active client connections"