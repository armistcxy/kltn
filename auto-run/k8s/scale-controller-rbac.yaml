# ServiceAccount + RBAC cho scale-controller Deployment được tạo bởi auto-run.
# Apply một lần, không cần thay đổi giữa các run.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scale-controller
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: scale-controller
rules:
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: scale-controller
subjects:
  - kind: ServiceAccount
    name: scale-controller
    namespace: default
roleRef:
  kind: ClusterRole
  name: scale-controller
  apiGroup: rbac.authorization.k8s.io
