storageScaling:
  enabled: true
  pollInterval: 30s
  namespace: default
  cluster: pg-cluster

  pgdata:
    scaleUpThresholdPercent: 80
    criticalThresholdPercent: 90
    stepPercent: 50
    maxSizeGi: 100
    cooldownMinutes: 1
    longTermDerivWindow: 2m
    longTermQuantileWindow: 20m
    longTermSampleInterval: 30s
    shortTermDerivWindow: 1m
    shortTermQuantileWindow: 10m
    shortTermSampleInterval: 15s
    preemptiveResizeIfFullInHours: 0.15

  wal:
    enabled: false
    scaleUpThresholdPercent: 70
    criticalThresholdPercent: 85
    stepPercent: 50
    maxSizeGi: 50
    cooldownMinutes: 10

  safetyGuards:
    blockIfWalArchivePending: 100
    blockIfReplicationLagSeconds: 30
