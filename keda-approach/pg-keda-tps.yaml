apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: pg-cluster-scaler
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    name: pg-cluster
  minReplicaCount: 2
  maxReplicaCount: 10
  cooldownPeriod: 300
  pollingInterval: 30
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-operated.monitoring.svc:9090 
      metricName: pg_cluster_tps_total
      threshold: "100" 
      query: |
        sum(rate(cnpg_pg_stat_database_xact_commit{namespace="default", pod=~"pg-cluster-.*"}[1m])) 
        + 
        sum(rate(cnpg_pg_stat_database_xact_rollback{namespace="default", pod=~"pg-cluster-.*"}[1m]))