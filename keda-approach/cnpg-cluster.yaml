apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-cluster
spec:
  instances: 2
  storage:
    size: 10Gi
  bootstrap: 
    initdb: 
      database: app  
      owner: app
      secret:
        name: pg-cluster-app-user
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      wal_level: replica
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: all